<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Almacén - Login</title>

<link rel="stylesheet" href="/leoalmacen/assets/css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
    .brand,
.section-title {
    color: #b30000;
    font-size: 58px;
    font-weight: 700;
    letter-spacing: -1px;
    text-align: center;
 
  font-family: Arial, Helvetica, sans-serif;


  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: #b30000;
    letter-spacing: -0.5px;
    text-align: center;
    margin-top: 15px;
  }

  /* Estilos para el texto de soporte */
  .support-info {
    margin-top: 25px;
    text-align: center;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    border-top: 1px solid #eee; /* Una línea sutil para separar */
    padding-top: 15px;
  }

  .support-phone {
    color: #b30000;
    font-weight: bold;
    text-decoration: none;
    font-size: 15px;
    display: block; /* Para que quede en su propia línea */
    margin-top: 2px;
  }
  
  .support-phone:hover {
      text-decoration: underline;
  }
</style>
</head>

<body class="bg-white">
  <main class="login-page">
    <section class="login-card">

      <h1 class="brand">ALMACÉN</h1>

      <div class="red-cross" aria-hidden="true">
</div>
      <img src="/leoalmacen/assets/img/emblema.png"
     alt="cruz"
     width="250"
     height="250"
     style="position: relative; left: 10px;">
     </div>

      <h2 class="section-title">INICIO DE SESIÓN</h2>

      <form class="login-form" method="POST" action="/leoalmacen/backend/login/login.php">

        <label>Usuario</label>
        <input type="text" name="usuario" placeholder="Usuario" required>

        <label>Contraseña</label>
        <input type="password" name="password" placeholder="Contraseña" required>

        <button class="btn-red" type="submit">INICIAR SESIÓN</button>
      </form>

      <div class="support-info">
          ¿OLVIDASTE TU CONTRASEÑA?<br>
          COMUNÍCATE CON SISTEMAS:
          <a href="tel:+522223912857" class="support-phone">
            <i class="ri-phone-fill"></i> +52 222 391 2857
          </a>
      </div>

    </section>
  </main>

<script src="/leoalmacen/assets/js/app.js"></script>
</body>
</html>
